{% extends "base.html" %}

{% block content %}
<div class="container">
  <section class="hero-section">
    <h1 class="page-title">Jujutsu Techniques</h1>
    <p class="page-subtitle">Master the art of cursed energy manipulation</p>
  </section>

  <section class="content-section">
    <div class="techniques-grid">
      {% for technique in techniques %}
      <a href="/techniques/{{ technique.slug }}" class="technique-card">
        <div class="technique-card-header">
          <h3>{{ technique.name }}</h3>
          <span class="tech-rank">{{ technique.power_level }}</span>
        </div>
        <div class="technique-card-body">
          <p class="tech-type">{{ technique.type }}</p>
          <p class="tech-user">👤 {{ technique.user }}</p>
        </div>
      </a>
      {% endfor %}
    </div>
  </section>
</div>

<style>
  .techniques-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 40px;
  }

  .technique-card {
    background: linear-gradient(135deg, rgba(150, 100, 255, 0.1), rgba(50, 50, 150, 0.1));
    border: 2px solid rgba(150, 100, 255, 0.3);
    border-radius: 8px;
    padding: 20px;
    transition: all 0.3s ease;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }

  .technique-card:hover {
    transform: translateY(-5px);
    border-color: rgba(150, 100, 255, 0.8);
    box-shadow: 0 10px 30px rgba(150, 100, 255, 0.2);
  }

  .technique-card-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 15px;
  }

  .technique-card-header h3 {
    font-size: 1.4rem;
    margin: 0;
    flex: 1;
  }

  .tech-rank {
    background: rgba(150, 100, 255, 0.3);
    color: #9964ff;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: bold;
    white-space: nowrap;
  }

  .tech-type {
    margin: 10px 0;
    color: rgba(150, 100, 255, 0.7);
    font-weight: bold;
    font-size: 0.9rem;
  }

  .tech-user {
    margin: 10px 0;
    color: rgba(255, 255, 255, 0.8);
  }
</style>
{% endblock %}
