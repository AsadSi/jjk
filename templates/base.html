<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0a0d" id="meta-theme-color" />
    <title>Jujutsu Kaisen Character Showcase</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("jjk-theme");
          if (t === "light") document.documentElement.setAttribute("data-theme", "light");
          else document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="kanji-bg" class="kanji-bg" aria-hidden="true"></div>
    <div id="cursor" class="cursor"></div>
    <div id="cursor-ring" class="cursor-ring"></div>
    {% block content %}{% endblock %}
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
